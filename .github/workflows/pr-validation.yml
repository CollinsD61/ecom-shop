# =============================================================================
# 1. PR Validation — Toan bo repo
# =============================================================================
# Trigger: moi Pull Request vao main/develop
# Viec lam: lint, unit test, security scan basic
# Muc tieu: chan loi som truoc khi merge
# =============================================================================

name: "PR Validation"

on:
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Detect changed paths — xac dinh phan nao thay doi
  # ---------------------------------------------------------------------------
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      terraform: ${{ steps.filter.outputs.terraform }}
      helm: ${{ steps.filter.outputs.helm }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'ecom-backend/**'
            frontend:
              - 'ecom-frontend/**'
            terraform:
              - 'terraform/**'
            helm:
              - 'ecom-shop-chart/**'

  # ---------------------------------------------------------------------------
  # Backend — lint + unit test (matrix 3 services)
  # ---------------------------------------------------------------------------
  backend-validate:
    name: "Backend [${{ matrix.service }}]"
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [user-service, product-service, shopping-cart-service]
    defaults:
      run:
        working-directory: ecom-backend/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Lint — check code style (Maven Checkstyle)
        run: ./mvnw checkstyle:check -q || echo "::warning::Checkstyle not configured, skipping"

      - name: Unit Tests
        run: ./mvnw test -B -q

  # ---------------------------------------------------------------------------
  # Frontend — lint + unit test
  # ---------------------------------------------------------------------------
  frontend-validate:
    name: Frontend Validate
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ecom-frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: ecom-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint src/ --max-warnings 0 || echo "::warning::ESLint issues found"

      - name: Unit Tests
        run: npm test -- --watchAll=false --passWithNoTests
        env:
          CI: true

  # ---------------------------------------------------------------------------
  # Terraform — fmt + validate
  # ---------------------------------------------------------------------------
  terraform-validate:
    name: "Terraform Validate [${{ matrix.env }}]"
    needs: changes
    if: needs.changes.outputs.terraform == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env: [shared, dev, prod]
    defaults:
      run:
        working-directory: terraform/environments/${{ matrix.env }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5"

      - name: Terraform fmt
        run: terraform fmt -check -recursive ../../

      - name: Terraform init (backend=false)
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

  # ---------------------------------------------------------------------------
  # Helm — lint chart
  # ---------------------------------------------------------------------------
  helm-validate:
    name: Helm Lint
    needs: changes
    if: needs.changes.outputs.helm == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Helm lint (dev)
        run: helm lint ecom-shop-chart -f ecom-shop-chart/values/dev.yaml

      - name: Helm lint (prod)
        run: helm lint ecom-shop-chart -f ecom-shop-chart/values/prod.yaml

  # ---------------------------------------------------------------------------
  # Security Scan — Trivy
  # ---------------------------------------------------------------------------
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: "1"
          format: table

  # ---------------------------------------------------------------------------
  # Gate — tat ca check phai pass
  # ---------------------------------------------------------------------------
  pr-gate:
    name: PR Gate ✅
    if: always()
    needs:
      - backend-validate
      - frontend-validate
      - terraform-validate
      - helm-validate
      - security-scan
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          echo "Backend:    ${{ needs.backend-validate.result }}"
          echo "Frontend:   ${{ needs.frontend-validate.result }}"
          echo "Terraform:  ${{ needs.terraform-validate.result }}"
          echo "Helm:       ${{ needs.helm-validate.result }}"
          echo "Security:   ${{ needs.security-scan.result }}"

          # Fail neu bat ky job nao that bai (bo qua skipped)
          if [[ "${{ needs.backend-validate.result }}" == "failure" ]] || \
             [[ "${{ needs.frontend-validate.result }}" == "failure" ]] || \
             [[ "${{ needs.terraform-validate.result }}" == "failure" ]] || \
             [[ "${{ needs.helm-validate.result }}" == "failure" ]] || \
             [[ "${{ needs.security-scan.result }}" == "failure" ]]; then
            echo "::error::One or more checks failed"
            exit 1
          fi
          echo "All checks passed!"
