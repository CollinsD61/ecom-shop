# =============================================================================
# 3. Frontend CI/CD (S3 Static Hosting)
# =============================================================================
# Trigger: thay doi trong ecom-frontend (push vao main/develop)
# Viec lam: build React bundle va sync len Amazon S3
# Muc tieu: Deploy Frontend len S3 + Cloudflare CDN
# =============================================================================

name: "Frontend CI/CD"

on:
  push:
    branches: [main, develop]
    paths:
      - "ecom-frontend/**"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-southeast-1

jobs:
  build-and-deploy:
    name: Build & Deploy to S3
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ecom-frontend
    steps:
      - uses: actions/checkout@v4

      # --- Determine Environment Variables based on Branch ---
      - name: Set environment variables
        id: env_vars
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          
          if [ "$BRANCH" = "main" ]; then
            echo "S3_BUCKET=shop.dohoangdevops.io.vn" >> $GITHUB_ENV
            echo "API_URL=https://api.shop.dohoangdevops.io.vn/api" >> $GITHUB_ENV
            echo "APP_URL=https://shop.dohoangdevops.io.vn" >> $GITHUB_ENV
            echo "ENV_NAME=Production" >> $GITHUB_ENV
          else
            echo "S3_BUCKET=shop-dev.dohoangdevops.io.vn" >> $GITHUB_ENV
            echo "API_URL=https://api.shop-dev.dohoangdevops.io.vn/api" >> $GITHUB_ENV
            echo "APP_URL=https://shop-dev.dohoangdevops.io.vn" >> $GITHUB_ENV
            echo "ENV_NAME=Development" >> $GITHUB_ENV
          fi

      # --- Node.js ---
      - name: Set up Node 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: ecom-frontend/package-lock.json

      # --- Install + Test ---
      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --watchAll=false --passWithNoTests
        env:
          CI: true

      # --- Build React Bundle ---
      - name: Build production bundle
        run: npm run build
        env:
          REACT_APP_USER_API_URL: ${{ env.API_URL }}/user/
          REACT_APP_PRODUCT_API_URL: ${{ env.API_URL }}/product/
          REACT_APP_CART_API_URL: ${{ env.API_URL }}/shopping-cart/

      # --- AWS credentials ---
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # --- Deploy to S3 ---
      - name: Sync files to S3
        run: |
          echo "Deploying to $S3_BUCKET..."
          aws s3 sync build/ s3://${S3_BUCKET} --delete --cache-control "max-age=300, must-revalidate"
          aws s3 cp build/index.html s3://${S3_BUCKET}/index.html --cache-control "no-cache, no-store, must-revalidate"

      # --- Purge Cloudflare cache (avoid stale images after deploy) ---
      - name: Purge Cloudflare cache
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ZONE_NAME: ${{ env.S3_BUCKET }}
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN}" ]; then
            echo "CLOUDFLARE_API_TOKEN is empty. Skip purge."
            exit 0
          fi

          echo "Purging Cloudflare cache for zone: ${ZONE_NAME}"

          ZONE_ID=$(curl -s -X GET "https://api.cloudflare.com/client/v4/zones?name=${ZONE_NAME}&status=active" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" | jq -r '.result[0].id')

          if [ -z "${ZONE_ID}" ] || [ "${ZONE_ID}" = "null" ]; then
            echo "::warning::Cloudflare zone not found for ${ZONE_NAME}. Skip cache purge."
            exit 0
          fi

          RESPONSE=$(curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}')

          echo "${RESPONSE}" | jq .
          if [ "$(echo "${RESPONSE}" | jq -r '.success')" != "true" ]; then
            echo "::error::Cloudflare purge failed."
            exit 1
          fi

      # --- Summary ---
      - name: Job summary
        run: |
          echo "### ✅ Frontend Deployed to S3" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | \`${{ env.ENV_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| S3 Bucket | \`${{ env.S3_BUCKET }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend URL | \`${{ env.APP_URL }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| API Endpoint | \`${{ env.API_URL }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${GITHUB_REF_NAME}\` |" >> $GITHUB_STEP_SUMMARY
