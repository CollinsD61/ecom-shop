# =============================================================================
# 4. App CD — Helm/GitOps qua ArgoCD
# =============================================================================
# Trigger: sau khi Backend CI hoan thanh,
#          hoac chay thu cong (workflow_dispatch)
# Viec lam: cap nhat image tag trong values env, ArgoCD auto-sync
# Muc tieu: deploy ung dung (khong dung infra)
# =============================================================================

name: "App CD"

on:
  # Trigger tu cac CI workflows
  workflow_run:
    workflows: ["Backend CI"]
    types: [completed]
    branches: [main, develop]

  # Cho phep chay thu cong
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - prod
      service:
        description: "Service to deploy (all = deploy tat ca)"
        required: true
        type: choice
        options:
          - all
          - user-service
          - product-service
          - shopping-cart-service
      image_tag:
        description: "Image tag to deploy (e.g. abc1234)"
        required: true
        type: string

permissions:
  contents: write
  id-token: write

env:
  HELM_VALUES_DIR: ecom-shop-chart/values

jobs:
  # ---------------------------------------------------------------------------
  # Determine deploy parameters
  # ---------------------------------------------------------------------------
  prepare:
    name: Prepare Deploy
    runs-on: ubuntu-latest
    # Chi chay khi workflow_run thanh cong hoac manual dispatch
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    outputs:
      environment: ${{ steps.params.outputs.environment }}
      services: ${{ steps.params.outputs.services }}
      image_tag: ${{ steps.params.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine parameters
        id: params
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual dispatch — dung input truc tiep
            ENV="${{ inputs.environment }}"
            TAG="${{ inputs.image_tag }}"
            SVC="${{ inputs.service }}"
          else
            # Auto trigger tu Backend CI — dung branch-latest de tranh mismatch tag
            WF_NAME="${{ github.event.workflow_run.name }}"
            BRANCH="${{ github.event.workflow_run.head_branch }}"

            if [ "$WF_NAME" != "Backend CI" ]; then
              echo "::error::Unsupported workflow trigger: $WF_NAME"
              exit 1
            fi

            if [ "$BRANCH" = "main" ]; then
              ENV="prod"
              TAG="latest"
            else
              ENV="dev"
              TAG="${BRANCH}-latest"
            fi
            SVC="all"
          fi

          # Xay dung list services
          if [ "$SVC" = "all" ]; then
            SERVICES='["user-service","product-service","shopping-cart-service"]'
          else
            SERVICES="[\"${SVC}\"]"
          fi

          echo "environment=${ENV}" >> "$GITHUB_OUTPUT"
          echo "services=${SERVICES}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${TAG}" >> "$GITHUB_OUTPUT"

          echo "### Deploy Parameters" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: ${ENV}" >> $GITHUB_STEP_SUMMARY
          echo "- **Services**: ${SERVICES}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image tag**: ${TAG}" >> $GITHUB_STEP_SUMMARY

  # ---------------------------------------------------------------------------
  # Update Helm values — cap nhat image tag trong values/<env>.yaml
  # ---------------------------------------------------------------------------
  update-helm-values:
    name: Update Helm Values
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Update image tag in Helm values
        run: |
          ENV="${{ needs.prepare.outputs.environment }}"
          TAG="${{ needs.prepare.outputs.image_tag }}"
          SERVICES='${{ needs.prepare.outputs.services }}'
          VALUES_FILE="${HELM_VALUES_DIR}/${ENV}.yaml"

          echo "Updating services to tag ${TAG} in ${VALUES_FILE}"

          for SVC in $(echo "$SERVICES" | jq -r '.[]'); do
            # Service key trong values.yaml: services["<service-name>"].image.tag
            if ! yq -e ".services[\"${SVC}\"]" "${VALUES_FILE}" >/dev/null; then
              echo "::error::Service '${SVC}' not found in ${VALUES_FILE}"
              exit 1
            fi
            yq -i ".services[\"${SVC}\"].image.tag = \"${TAG}\"" "${VALUES_FILE}"
          done

          echo "Updated image tags in ${VALUES_FILE}"
          yq '.services | to_entries | .[] | {service: .key, tag: .value.image.tag}' "${VALUES_FILE}"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          ENV="${{ needs.prepare.outputs.environment }}"
          TAG="${{ needs.prepare.outputs.image_tag }}"

          git add "${HELM_VALUES_DIR}/${ENV}.yaml"

          # Chi commit neu co thay doi
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "deploy(${ENV}): backend services -> ${TAG} [skip ci]"
            git push
          fi

  # ---------------------------------------------------------------------------
  # ArgoCD Sync — trigger sync sau khi cap nhat values
  # ---------------------------------------------------------------------------
  argocd-sync:
    name: "ArgoCD Sync (${{ needs.prepare.outputs.environment }})"
    needs: [prepare, update-helm-values]
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Update kubeconfig
        run: |
          ENV="${{ needs.prepare.outputs.environment }}"
          if [ "$ENV" = "prod" ]; then
            CLUSTER="prod-ecom-cluster"
          else
            CLUSTER="dev-ecom-cluster"
          fi
          aws eks update-kubeconfig --name "${CLUSTER}" --region ap-southeast-1

      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x argocd
          sudo mv argocd /usr/local/bin/

      - name: Trigger ArgoCD sync
        run: |
          ENV="${{ needs.prepare.outputs.environment }}"
          APP_NAME="ecom-shop-${ENV}"

          # Port-forward ArgoCD server
          kubectl port-forward svc/argocd-server -n argocd 8080:443 &
          sleep 5

          # Login bang admin password tu secret
          ARGOCD_PWD=$(kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath="{.data.password}" | base64 -d)
          argocd login localhost:8080 --username admin --password "${ARGOCD_PWD}" --insecure

          # Sync app
          argocd app sync "${APP_NAME}" --force --prune

          # Doi app healthy
          argocd app wait "${APP_NAME}" --timeout 300

          echo "### ✅ ArgoCD Sync Complete" >> $GITHUB_STEP_SUMMARY
          echo "- **App**: ${APP_NAME}" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: ${ENV}" >> $GITHUB_STEP_SUMMARY
