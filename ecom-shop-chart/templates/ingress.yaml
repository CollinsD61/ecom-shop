{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "ecom-shop-chart.fullname" . }}
  labels:
    {{- include "ecom-shop-chart.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          {{- $svc := index $.Values.services .service }}
          {{- if not $svc }}
          {{- fail (printf "ingress path service '%s' not found in values.services" .service) }}
          {{- end }}
          - path: {{ .path }}
            {{- with .pathType }}
            pathType: {{ . }}
            {{- end }}
            backend:
              service:
                name: {{ include "ecom-shop-chart.serviceFullname" (dict "root" $ "name" .service) }}
                port:
                  number: {{ default $svc.service.port .port }}
          {{- end }}
    {{- end }}
{{- end }}
