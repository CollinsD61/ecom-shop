{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
{{- if $svc.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "ecom-shop-chart.itemServiceAccountName" (dict "root" $ "name" $name "svc" $svc) }}
  labels:
    {{- include "ecom-shop-chart.serviceLabels" (dict "root" $ "name" $name) | nindent 4 }}
  {{- with $svc.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ $svc.serviceAccount.automount }}
---
{{- end }}
{{- end }}
{{- end }}
