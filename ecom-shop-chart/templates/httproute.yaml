{{- if .Values.httpRoute.enabled -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "ecom-shop-chart.fullname" . }}
  labels:
    {{- include "ecom-shop-chart.labels" . | nindent 4 }}
  {{- with .Values.httpRoute.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- with .Values.httpRoute.parentRefs }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.httpRoute.hostnames }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.httpRoute.rules }}
    {{- $backendService := .backendService }}
    {{- $svc := index $.Values.services $backendService }}
    {{- if not $svc }}
    {{- fail (printf "httpRoute backendService '%s' not found in values.services" $backendService) }}
    {{- end }}
    {{- with .matches }}
    - matches:
      {{- toYaml . | nindent 8 }}
    {{- end }}
    {{- with .filters }}
      filters:
      {{- toYaml . | nindent 8 }}
    {{- end }}
      backendRefs:
        - name: {{ include "ecom-shop-chart.serviceFullname" (dict "root" $ "name" $backendService) }}
          port: {{ $svc.service.port }}
          weight: 1
    {{- end }}
{{- end }}
