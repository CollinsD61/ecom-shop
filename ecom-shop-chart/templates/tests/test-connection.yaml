{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "ecom-shop-chart.serviceFullname" (dict "root" $ "name" $name) }}-test-connection"
  labels:
    {{- include "ecom-shop-chart.serviceLabels" (dict "root" $ "name" $name) | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox
      command: ["wget"]
      args: ["{{ include "ecom-shop-chart.serviceFullname" (dict "root" $ "name" $name) }}:{{ $svc.service.port }}"]
  restartPolicy: Never
---
{{- end }}
{{- end }}
