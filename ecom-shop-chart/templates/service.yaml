{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ecom-shop-chart.serviceFullname" (dict "root" $ "name" $name) }}
  labels:
    {{- include "ecom-shop-chart.serviceLabels" (dict "root" $ "name" $name) | nindent 4 }}
spec:
  type: {{ $svc.service.type }}
  ports:
    - port: {{ $svc.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "ecom-shop-chart.serviceSelectorLabels" (dict "root" $ "name" $name) | nindent 4 }}
---
{{- end }}
{{- end }}
