nameOverride: ""
fullnameOverride: ""
imagePullSecrets: []
# External Secrets Operator integration for AWS Secrets Manager
externalSecrets:
  enabled: true
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secretsmanager
ingress:
  enabled: true
  className: alb
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
    alb.ingress.kubernetes.io/healthcheck-path: /actuator/health
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
  hosts:
    - host: api-dev.dohoangdevops.io.vn
      paths:
        - path: /api/user
          pathType: Prefix
          service: user-service
        - path: /api/product
          pathType: Prefix
          service: product-service
        - path: /api/shopping-cart
          pathType: Prefix
          service: shopping-cart-service
  tls: []
# Optional Gateway API HTTPRoute support (disabled by default)
httpRoute:
  enabled: false
  annotations: {}
  parentRefs:
    - name: gateway
      sectionName: http
  hostnames:
    - api-dev.dohoangdevops.io.vn
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/user
      backendService: user-service
services:
  user-service:
    enabled: true
    replicaCount: 1
    image:
      repository: 879381260173.dkr.ecr.ap-southeast-1.amazonaws.com/user-service
      tag: develop-8f6325b
      pullPolicy: Always
    containerPort: 5865
    service:
      type: ClusterIP
      port: 5865
    serviceAccount:
      create: true
      automount: true
      name: ""
      annotations:
        eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/sa-user-service-dev-role
    podAnnotations: {}
    podLabels: {}
    podSecurityContext: {}
    securityContext: {}
    env:
      - name: SPRING_PROFILES_ACTIVE
        value: dev
    envFromSecrets:
      - user-service-secret-dev
    resources:
      requests:
        cpu: "200m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
    livenessProbe:
      httpGet:
        path: /actuator/health
        port: http
      initialDelaySeconds: 180
      periodSeconds: 15
    readinessProbe:
      httpGet:
        path: /actuator/health
        port: http
      initialDelaySeconds: 120
      periodSeconds: 10
    autoscaling:
      enabled: true
      minReplicas: 1
      maxReplicas: 3
      targetCPUUtilizationPercentage: 75
      targetMemoryUtilizationPercentage: 80
    volumes: []
    volumeMounts: []
    nodeSelector: {}
    tolerations: []
    affinity: {}
    externalSecret:
      enabled: true
      refreshInterval: 1h
      targetSecretName: user-service-secret-dev
      secretStoreRef:
        kind: ClusterSecretStore
        name: aws-secretsmanager
      data:
        - secretKey: SPRING_DATASOURCE_URL
          remoteRef:
            key: /ecom/dev/user-service/db
            property: jdbc_url
        - secretKey: SPRING_DATASOURCE_USERNAME
          remoteRef:
            key: /ecom/dev/user-service/db
            property: username
        - secretKey: SPRING_DATASOURCE_PASSWORD
          remoteRef:
            key: /ecom/dev/user-service/db
            property: password
  product-service:
